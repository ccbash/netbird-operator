{{- if .Values.gateway.enabled }}
{{- $class := .Values.gateway.className | default (include "netbird-operator.fullname" .) }}
{{- $domain := required "gateway.domain is required when gateway.enabled" .Values.gateway.domain }}
---
apiVersion: netbird.io/v1alpha1
kind: ReverseProxyClusterParameters
metadata:
  name: {{ $class }}
  labels:
    {{- include "netbird-operator.labels" . | nindent 4 }}
spec:
  private: {{ .Values.gateway.private }}
  {{- with .Values.gateway.image }}
  image: {{ . | quote }}
  {{- end }}
  replicas: {{ .Values.gateway.replicas }}
  {{- with .Values.gateway.groups }}
  groups:
    {{- range . }}
    - name: {{ . | quote }}
    {{- end }}
  {{- end }}
  {{- with .Values.gateway.serviceAnnotations }}
  serviceAnnotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ $class }}
  labels:
    {{- include "netbird-operator.labels" . | nindent 4 }}
spec:
  controllerName: netbird.io/byop-proxy
  parametersRef:
    group: netbird.io
    kind: ReverseProxyClusterParameters
    name: {{ $class }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $class }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netbird-operator.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ $class }}
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.{{ $domain }}"
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ required "gateway.certSecretName is required when gateway.enabled" .Values.gateway.certSecretName | quote }}
      allowedRoutes:
        namespaces:
          from: All
{{- end }}
