{{- if .Values.gatewayAPI.enabled }}
# A single GatewayClass serves both exposure modes — the behaviour is chosen by
# the route kind (HTTPRoute -> L7 reverse proxy, TCPRoute -> L4 mesh resource),
# not by the class. It is cluster-scoped and referenced by long-lived Gateways
# that may live outside this release; keep it across upgrades/uninstall so a
# chart change can't prune it and leave referencing Gateways (and the operator
# finalizer that protects them) stuck on a Terminating class.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: netbird
  labels:
    {{- include "netbird-operator.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  controllerName: "gateway.netbird.io/controller"
{{- end }}
