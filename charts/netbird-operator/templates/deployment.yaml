apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netbird-operator.fullname" . }}
  labels:
    app.kubernetes.io/component: operator
    {{- include "netbird-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicaCount }}
  selector:
    matchLabels:
      {{- include "netbird-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.operator.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/component: operator
        {{- include "netbird-operator.labels" . | nindent 8 }}
        {{- with .Values.operator.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.operator.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "netbird-operator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.operator.podSecurityContext | nindent 8 }}
      containers:
        # Container names must be DNS labels (no dots), so sanitize — a dev/CI
        # chart name like "netbird-operator-release-v0.9.x" would otherwise be
        # rejected.
        - name: {{ include "netbird-operator.name" . | replace "." "-" | trunc 63 | trimSuffix "-" }}
          securityContext:
            {{- toYaml .Values.operator.securityContext | nindent 12 }}
          image: "{{ .Values.operator.image.registry }}/{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          args:
          {{- with .Values.operator.logging }}
          - --log-level={{ .level | default "info" }}
          - --log-format={{ .format | default "json" }}
          {{- end }}
          {{- if .Values.operator.metrics.enabled }}
          - --metrics-bind-address=:{{ .Values.operator.metrics.port}}
          {{- end }}
          - --leader-elect
          - --health-probe-bind-address=:{{ .Values.operator.livenessProbe.port }}
          - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
          - --runtime-namespace=$(POD_NAMESPACE)
          {{- if not .Values.advertiseLoadBalancers }}
          - --advertise-loadbalancers=false
          {{- end }}
          {{- if .Values.defaultResourceGroups }}
          - --default-resource-groups={{ .Values.defaultResourceGroups }}
          {{- end }}
          {{- if .Values.managementURL }}
          - --netbird-management-url={{.Values.managementURL}}
          {{- end }}
          {{- if .Values.netbirdAPI.keyFromSecret }}
          - --netbird-api-key=$(NB_API_KEY)
          {{- end }}
          {{- if .Values.routingClientImage }}
          - --netbird-client-image={{.Values.routingClientImage}}
          {{- end }}
          ports:
            - name: webhook-server
              containerPort: {{ .Values.webhook.service.targetPort }}
              protocol: TCP
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: {{ .Values.operator.livenessProbe.port }}
              scheme: HTTP
            initialDelaySeconds: {{ .Values.operator.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.operator.livenessProbe.periodSeconds }}
            successThreshold: {{ .Values.operator.livenessProbe.successThreshold }}
            timeoutSeconds: {{ .Values.operator.livenessProbe.timeoutSeconds }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          {{- if .Values.netbirdAPI.keyFromSecret }}
            - name: NB_API_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.netbirdAPI.keyFromSecret }}
                  name: {{ .Values.netbirdAPI.keyFromSecret.name }}
                  key: {{ .Values.netbirdAPI.keyFromSecret.key }}
                  {{- else }}
                  name: {{ include "netbird-operator.fullname" . }}
                  key: NB_API_KEY
                  {{- end }}
          {{- end }}
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /readyz
              port: {{ .Values.operator.readinessProbe.port }}
              scheme: HTTP
            initialDelaySeconds: {{ .Values.operator.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.operator.readinessProbe.periodSeconds }}
            successThreshold: {{ .Values.operator.readinessProbe.successThreshold }}
            timeoutSeconds: {{ .Values.operator.readinessProbe.timeoutSeconds }}
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
          volumeMounts:
          - mountPath: /tmp/k8s-webhook-server/serving-certs
            name: webhook-certs
            readOnly: true
          {{- with .Values.operator.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
      - name: webhook-certs
        secret:
          defaultMode: 420
          secretName: {{ template "netbird-operator.webhookCertSecret" . }}
      {{- with .Values.operator.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
