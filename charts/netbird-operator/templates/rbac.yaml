apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "netbird-operator.fullname" . }}
  labels:
    {{- include "netbird-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - netbird.io
  resources:
  - setupkeys
  - groups
  - networks
  - networkresources
  - dnszones
  - dnsrecords
  - reverseproxyservices
  - sidecarprofiles
  - clusterproxies
  verbs:
  - get
  - patch
  - update
  - list
  - watch
  - create
  - delete
- apiGroups:
  - netbird.io
  resources:
  - setupkeys/status
  - groups/status
  - networks/status
  - networkresources/status
  - dnszones/status
  - dnsrecords/status
  - reverseproxyservices/status
  - sidecarprofiles/status
  - clusterproxies/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - netbird.io
  resources:
  - setupkeys/finalizers
  - groups/finalizers
  - networks/finalizers
  - networkresources/finalizers
  - dnszones/finalizers
  - dnsrecords/finalizers
  - reverseproxyservices/finalizers
  - sidecarprofiles/finalizers
  verbs:
  - update
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - patch
  - update
  - list
  - watch
  - create
  - delete
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
# Events are created in the involved object's namespace, which can be any
# namespace — so this must be cluster-scoped, not a namespaced Role.
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
{{- if or .Values.netbirdAPI.keyFromSecret .Values.clusterSecretsPermissions.allowAllSecrets }}
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
{{- if .Values.netbirdAPI.keyFromSecret }}
  - patch
  - update
  - create
  - delete
{{- end }}
{{- end }}
{{- if .Values.gatewayAPI.enabled }}
- apiGroups: ["gateway.networking.k8s.io"]
  resources:
    - gatewayclasses
    - gateways
    - httproutes
    - tcproutes
  verbs:
    - get
    - list
    - watch
    - update
    - patch
- apiGroups: ["gateway.networking.k8s.io"]
  resources:
    - gatewayclasses/status
    - gateways/status
    - httproutes/status
    - tcproutes/status
  verbs:
    - update
    - patch
- apiGroups: ["gateway.networking.k8s.io"]
  resources:
    - gateways/finalizers
  verbs:
    - update
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "netbird-operator.fullname" . }}
  labels:
    {{- include "netbird-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "netbird-operator.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "netbird-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- if .Values.operator.metrics.enabled }}
---
# Lets the operator authenticate/authorize metrics scrapers via the
# TokenReview/SubjectAccessReview APIs (required for --metrics-secure).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "netbird-operator.fullname" . }}-auth-delegator
  labels:
    {{- include "netbird-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
- kind: ServiceAccount
  name: {{ include "netbird-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "netbird-operator.fullname" . }}
  labels:
    {{- include "netbird-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "netbird-operator.fullname" . }}
  labels:
    {{- include "netbird-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "netbird-operator.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "netbird-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
