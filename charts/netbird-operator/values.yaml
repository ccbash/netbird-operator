clusterSecretsPermissions:
  # Required for NBSetupKey validation
  # Required for Ingress functionality to create and validate secrets for routing peers
  allowAllSecrets: true

webhook:
  service:
    type: ClusterIP
    port: 443
    targetPort: 9443

  # TLS configuration for webhook
  # Optional, unused if webhook.enableCertManager is set to true
  tls: {}

  # Use cert-manager to provision webhook certificates (recommended)
  enableCertManager: true

  # Narrow down validation and mutation webhooks namespaces
  namespaceSelectors: []
    # - key: foo
    #   operator: In
    #   values:
    #   - bar

  # Narrow down validation and mutation webhooks objects
  objectSelector:
    matchExpressions: []
      # - key: app.kubernetes.io/name
      #   operator: NotIn
      #   values:
      #   - foo

   # Failure Policy for webhook
  failurePolicy: Fail

operator:
  # This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
  replicaCount: 1

  # This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
  image:
    # Set operator image registry
    registry: ghcr.io
    # Set operator image repository
    repository: ccbash/netbird-operator
    # This sets the pull policy for images.
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""

  # Logging configuration for the operator.
  logging:
    # Log verbosity: debug, info, warn, error, or a non-negative integer for
    # higher debug verbosity.
    level: info
    # Log output format: console (human-readable) or json (structured, for log
    # aggregation).
    format: json

  metrics:
    enabled: true
    type: ClusterIP
    # HTTPS by default — the operator authenticates/authorizes scrapers
    # (TokenReview/SubjectAccessReview). Scrape with a bearer token over https.
    port: 8443

  # This is for the secretes for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  imagePullSecrets: []
  # This is to override the chart name.
  nameOverride: ""
  fullnameOverride: ""

  #This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Automatically mount a ServiceAccount's API credentials?
    automount: true
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""

  # This is for setting Kubernetes Annotations to a Pod.
  # For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
  podAnnotations: {}
  # This is for setting Kubernetes Labels to a Pod.
  # For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
  podLabels: {}

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault


  # This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
  service:
    # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
    type: ClusterIP
    # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
    port: 9443

  # Default requests/limits so the operator pod isn't BestEffort (first to be
  # OOM-killed/evicted). Override as needed for your cluster's scale.
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

  # This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
  livenessProbe:
    port: 8081
    initialDelaySeconds: 15
    periodSeconds: 20
    successThreshold: 1
    timeoutSeconds: 1

  readinessProbe:
    port: 8081
    initialDelaySeconds: 5
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 1

  # Additional volumes on the output Deployment definition.
  volumes: []

  # Additional volumeMounts on the output Deployment definition.
  volumeMounts: []

  nodeSelector: {}

  tolerations: []

  affinity: {}

# DEPRECATED: Use NetworkRouters and NetworkResources instead.
cluster:
  # Cluster DNS name (used for webhook certificate SANs)
  dns: svc.cluster.local

netbirdAPI:
  keyFromSecret:
    name: "netbird-mgmt-api-key"
    key: "NB_API_KEY"

#routingClientImage: "netbirdio/netbird:latest"

# Everything that drives Service type=LoadBalancer exposure into NetBird.
loadBalancer:
  # Advertise type=LoadBalancer Services by default. Override per ns/Service with
  # the annotation netbird.io/advertise: "true"|"false".
  advertise: true
  # Comma-separated NetBird groups the advertised NetworkResource joins (so access
  # policies can target it). Override with the netbird.io/groups annotation.
  resourceGroups: ""
  # The NetBird Network the NetworkResource attaches to. Created elsewhere,
  # paired with its NetworkRouter (the routing-peer DaemonSet).
  network: ""
  # The DNSZone the <svc>-<ns>.<zone> records land in — created by this chart.
  # The CR (and the operator's reference) is named after the domain.
  dnsZone:
    domain: ""
    distributionGroups: []

# Enable the Gateway API controllers (GatewayClass/Gateway/HTTPRoute →
# ReverseProxyCluster/ReverseProxyService). Requires the Gateway API CRDs in the
# cluster. Auto-on when gateway.enabled below.
enableGatewayAPI: false

# Enable the Gateway API controllers (GatewayClass/Gateway/HTTPRoute →
# ReverseProxyCluster/ReverseProxyService). Requires the Gateway API CRDs in the
# cluster. Auto-on when gateway.enabled below.
enableGatewayAPI: false

# A NetBird bring-your-own reverse proxy is deployed by creating a Gateway of a
# netbird.io/byop-proxy GatewayClass — this renders that GatewayClass (+ its
# ReverseProxyClusterParameters) and one Gateway. The operator turns the Gateway
# into a ReverseProxyCluster (proxy Deployment + LB Service + DNS + custom
# domain). HTTPRoutes attached to the Gateway become ReverseProxyServices.
gateway:
  enabled: false
  # GatewayClass name (cluster-scoped). Defaults to the chart fullname.
  className: ""
  # Domain the proxy fronts, e.g. "example.com": the listener becomes
  # *.<domain>, the cluster address gate.<domain>.
  domain: ""
  # Wildcard TLS Secret (tls.crt/tls.key) in this namespace for the listener.
  certSecretName: ""
  # Optional: annotate the Gateway so cert-manager's gateway-shim issues the
  # listener cert for *.<domain> into certSecretName (the Gateway-API-native
  # way). Leave empty to reference a pre-provisioned secret. Just an annotation —
  # no cert-manager CRD dependency if unset.
  certIssuer: ""
  certIssuerKind: ClusterIssuer   # or "Issuer" for a namespaced issuer
  # Class-level params (ReverseProxyClusterParameters) shared by the Gateway:
  # NetBird groups the proxy's LoadBalancer resource joins.
  groups: []
  # Enable NetBird-Only (private) services: the proxy runs an embedded netbird
  # client. Group-based services work regardless.
  private: false
  # Override the proxy image / replicas (empty = operator defaults).
  image: ""
  replicas: 1
  # Annotations for the proxy's LoadBalancer Service (e.g. pin an LB-IPAM pool).
  serviceAnnotations: {}

general:
  # General labels, applied to all created K8s resources
  labels: {}
    # acme_com_managed_by: platform-engineering
    # acme_com_owned_by: release-engineering
