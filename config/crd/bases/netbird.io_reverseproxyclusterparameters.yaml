---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: reverseproxyclusterparameters.netbird.io
spec:
  group: netbird.io
  names:
    kind: ReverseProxyClusterParameters
    listKind: ReverseProxyClusterParametersList
    plural: reverseproxyclusterparameters
    singular: reverseproxyclusterparameters
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ReverseProxyClusterParameters is the implementation config a Gateway of the
          netbird.io/gateway-controller class points at via
          spec.infrastructure.parametersRef. It is namespaced and must live in the
          referencing Gateway's namespace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ReverseProxyClusterParametersSpec is the per-Gateway "flavor": the parts of a
              ReverseProxyCluster that aren't derived from a Gateway's own listeners. A
              Gateway derives its domain, clusterAddress and cert from its listeners and
              references these (in its own namespace) via spec.infrastructure.parametersRef
              to fill in the rest.
            properties:
              groups:
                description: |-
                  Groups are NetBird groups the proxy's advertised LoadBalancer resource
                  joins, so access policies can target it.
                items:
                  properties:
                    id:
                      description: ID is the id of the group.
                      type: string
                    localRef:
                      description: LocalReference is a reference to a group in the
                        same namespace.
                      properties:
                        name:
                          default: ""
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                    name:
                      description: Name is the name of the group.
                      type: string
                  type: object
                  x-kubernetes-validations:
                  - message: Exactly one of id, name, or localRef must be set
                    rule: (has(self.id)?1:0)+(has(self.name)?1:0)+(has(self.localRef)?1:0)==1
                type: array
              image:
                description: |-
                  Image overrides the netbird reverse-proxy image. Defaults to the operator's
                  pinned image.
                type: string
              logLevel:
                description: |-
                  LogLevel sets the proxy's log level (and its embedded netbird client's),
                  e.g. "error" to silence the embedded client's unused P2P/ICE warnings on a
                  centralised cluster. Empty keeps the image default.
                enum:
                - error
                - warn
                - info
                - debug
                - trace
                type: string
              private:
                description: |-
                  Private enables NetBird-Only services: the proxy runs an embedded netbird
                  client (userspace WireGuard). Group-based services work regardless.
                type: boolean
              replicas:
                description: Replicas of the proxy Deployment. Defaults to 1.
                format: int32
                minimum: 1
                type: integer
              serviceAnnotations:
                additionalProperties:
                  type: string
                description: |-
                  ServiceAnnotations are added to each Gateway's proxy LoadBalancer Service,
                  e.g. to pin an LB-IPAM pool.
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
