---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: dnsrecords.netbird.io
spec:
  group: netbird.io
  names:
    kind: DNSRecord
    listKind: DNSRecordList
    plural: dnsrecords
    singular: dnsrecord
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.content
      name: Content
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          DNSRecord is the Schema for the dnsrecords API. It is a thin mirror of a
          single NetBird DNS record.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              DNSRecordSpec defines the desired state of DNSRecord. It mirrors the NetBird
              DNS-record API (POST /api/dns/zones/{zone}/records) 1:1: a single record in a
              zone. The controller adopts an existing record matching name+type+content
              rather than recreating it (NetBird rejects duplicate records).
            properties:
              content:
                description: Content is the record content (e.g. the IP for an A/AAAA
                  record).
                minLength: 1
                type: string
              name:
                description: Name is the record name (a fully qualified name under
                  the zone).
                minLength: 1
                type: string
              ttl:
                default: 300
                description: TTL is the record TTL in seconds. Defaults to 300.
                minimum: 1
                type: integer
              type:
                description: Type is the record type.
                enum:
                - A
                - AAAA
                - CNAME
                - TXT
                - MX
                - NS
                - SRV
                - CAA
                type: string
              zoneRef:
                description: |-
                  ZoneRef references the DNSZone this record is created in. The zone must be
                  Ready; its status.zoneID identifies the NetBird zone.
                properties:
                  name:
                    description: Name of the referent.
                    type: string
                  namespace:
                    description: Namespace of the referent.
                    type: string
                required:
                - name
                - namespace
                type: object
                x-kubernetes-validations:
                - message: Value is immutable
                  rule: self == oldSelf
            required:
            - content
            - name
            - type
            - zoneRef
            type: object
          status:
            default:
              observedGeneration: -1
            description: DNSRecordStatus defines the observed state of DNSRecord.
            properties:
              conditions:
                description: Conditions holds the conditions for the DNSRecord.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the last reconciled generation.
                format: int64
                type: integer
              recordID:
                description: RecordID is the id of the created NetBird DNS record.
                type: string
              zoneID:
                description: ZoneID is the id of the zone the record is created in.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
