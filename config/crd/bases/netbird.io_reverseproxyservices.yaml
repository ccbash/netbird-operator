---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: reverseproxyservices.netbird.io
spec:
  group: netbird.io
  names:
    kind: ReverseProxyService
    listKind: ReverseProxyServiceList
    plural: reverseproxyservices
    singular: reverseproxyservice
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.domain
      name: Domain
      type: string
    - jsonPath: .status.serviceDomain
      name: Service Domain
      priority: 1
      type: string
    - jsonPath: .spec.private
      name: Private
      type: boolean
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ReverseProxyService publishes LoadBalancer Services through the NetBird
          reverse proxy, internally or externally. It is the admin's expose-or-not
          decision.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ReverseProxyServiceSpec defines the desired state of ReverseProxyService. It
              is admin-authored — creating one is the explicit decision to expose Services
              through the NetBird reverse proxy, internally or externally. It mirrors the
              NetBird reverse-proxy service API (POST /api/reverse-proxies/services),
              targeting the DNSRecord FQDN that belongs to each backend LoadBalancer Service.
            properties:
              accessGroups:
                description: |-
                  AccessGroups are the NetBird groups whose peers may reach a private
                  service over the tunnel. Required when Private is true; ignored otherwise.
                items:
                  properties:
                    id:
                      description: ID is the id of the group.
                      type: string
                    localRef:
                      description: LocalReference is a reference to a group in the
                        same namespace.
                      properties:
                        name:
                          default: ""
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                    name:
                      description: Name is the name of the group.
                      type: string
                  type: object
                  x-kubernetes-validations:
                  - message: Exactly one of id, name, or localRef must be set
                    rule: (has(self.id)?1:0)+(has(self.name)?1:0)+(has(self.localRef)?1:0)==1
                type: array
              accessRestrictions:
                description: AccessRestrictions sets IP/geo connection-level restrictions.
                properties:
                  allowedCidrs:
                    description: |-
                      AllowedCidrs is a CIDR allowlist. If non-empty, only matching source IPs
                      are allowed. Evaluated before BlockedCidrs.
                    items:
                      maxLength: 43
                      type: string
                    maxItems: 64
                    type: array
                    x-kubernetes-validations:
                    - message: allowedCidrs entries must be valid CIDRs
                      rule: self.all(c, isCIDR(c))
                  allowedCountries:
                    description: |-
                      AllowedCountries is an ISO 3166-1 alpha-2 country-code allowlist. If
                      non-empty, only these countries are permitted.
                    items:
                      maxLength: 2
                      type: string
                    maxItems: 250
                    type: array
                    x-kubernetes-validations:
                    - message: allowedCountries entries must be ISO 3166-1 alpha-2
                        codes
                      rule: self.all(c, c.matches('^[A-Za-z]{2}$'))
                  blockedCidrs:
                    description: BlockedCidrs is a CIDR blocklist. Matching source
                      IPs are rejected.
                    items:
                      maxLength: 43
                      type: string
                    maxItems: 64
                    type: array
                    x-kubernetes-validations:
                    - message: blockedCidrs entries must be valid CIDRs
                      rule: self.all(c, isCIDR(c))
                  blockedCountries:
                    description: BlockedCountries is an ISO 3166-1 alpha-2 country-code
                      blocklist.
                    items:
                      maxLength: 2
                      type: string
                    maxItems: 250
                    type: array
                    x-kubernetes-validations:
                    - message: blockedCountries entries must be ISO 3166-1 alpha-2
                        codes
                      rule: self.all(c, c.matches('^[A-Za-z]{2}$'))
                type: object
              backends:
                description: Backends are the LoadBalancer Services this service proxies
                  to, by path.
                items:
                  description: |-
                    ReverseProxyBackend names a Service this service proxies to. How the proxy
                    reaches it depends on the Service type: a type=LoadBalancer Service must be
                    advertised (have a DNSRecord) and is targeted by its dualstack mesh FQDN (so
                    IPv4/IPv6 is transparent, over the NetBird overlay); any other Service
                    (ClusterIP) is reached directly at its in-cluster DNS name — the drop-in path
                    for an in-cluster proxy.
                  properties:
                    path:
                      description: Path is the URL path prefix this backend serves
                        (HTTP). Defaults to "/".
                      type: string
                    port:
                      description: Port the proxy dials on the backend. Defaults to
                        the Service's first port.
                      type: integer
                    serviceRef:
                      description: |-
                        ServiceRef names the Service to proxy to, in the same namespace as the
                        ReverseProxyService.
                      properties:
                        name:
                          default: ""
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                  required:
                  - serviceRef
                  type: object
                maxItems: 64
                minItems: 1
                type: array
              crowdsecMode:
                description: CrowdsecMode sets the CrowdSec IP-reputation handling
                  for the service.
                enum:
                - "off"
                - observe
                - enforce
                type: string
              domain:
                description: |-
                  Domain is the public hostname clients connect to. For mode=http/tls it is
                  the service domain verbatim (HTTP routing / TLS SNI). For mode=tcp/udp it
                  is the shared host: NetBird allows only one service per domain, and L4
                  connections route by listen port (no SNI), so the operator publishes each
                  port under a distinct per-port sibling subdomain
                  <first-label>-<portName>.<parent> — e.g. mail.example.com + the backend's
                  "smtp" port becomes mail-smtp.example.com (the backend Service port's name,
                  or its number when unnamed; shown in status.serviceDomain). Expose several
                  L4 ports under one hostname with one CR per port, all sharing this Domain.
                  For tcp/udp the registered NetBird custom domain (or cluster address) must
                  be the PARENT (e.g. example.com), since the per-port siblings derive the
                  cluster through it; public DNS for the host points at the cluster ingress.
                minLength: 1
                type: string
              listenPort:
                description: |-
                  ListenPort is the public port the proxy listens on. Required for L4 modes
                  (tcp/tls/udp) — it both fixes the well-known port (e.g. 25/465/993 for
                  mail) and disambiguates the per-port service domain. Ignored for mode=http.
                maximum: 65535
                minimum: 0
                type: integer
              mode:
                default: http
                description: |-
                  Mode selects the proxy mode. "http" (default) is an L7 reverse proxy;
                  "tcp"/"tls"/"udp" are L4 passthrough on ListenPort. Expose several L4 ports
                  under one hostname with one CR per port (same Domain, distinct ListenPort).
                enum:
                - http
                - tcp
                - tls
                - udp
                type: string
              passHostHeader:
                description: |-
                  PassHostHeader, when true, forwards the original client Host header to the
                  backend instead of rewriting it to the backend address.
                type: boolean
              private:
                description: |-
                  Private, when true, makes the service NetBird-only: inbound peers
                  authenticate via their tunnel identity (no OIDC) and an ACL policy is
                  auto-generated from AccessGroups.
                type: boolean
              proxyCluster:
                description: |-
                  ProxyCluster is the address of the NetBird reverse-proxy cluster that
                  serves this service, e.g. "gate.example.com". The operator resolves it to
                  a proxy-cluster ID and points the service's targets at it.
                minLength: 1
                type: string
              proxyProtocol:
                description: |-
                  ProxyProtocol, when true, makes the proxy prepend a PROXY protocol v2
                  header to each backend connection so the backend sees the real client IP
                  and port instead of the proxy's. Applies to tcp/tls modes only (the
                  NetBird API rejects it elsewhere; HTTP conveys the client IP via
                  X-Forwarded-For). Required for mail backends that enforce SPF/DNSBL,
                  greylist, or log the client address — the backend must be configured to
                  accept PROXY protocol on the listening port.
                type: boolean
              rewriteRedirects:
                description: |-
                  RewriteRedirects, when true, rewrites Location headers in backend
                  responses to replace the backend address with the public domain.
                type: boolean
            required:
            - backends
            - domain
            - proxyCluster
            type: object
            x-kubernetes-validations:
            - message: accessGroups is required when private is true
              rule: '!has(self.private) || !self.private || (has(self.accessGroups)
                && self.accessGroups.size() > 0)'
            - message: private requires mode http (the NetBird API only supports the
                auto-ACL on HTTP services)
              rule: '!has(self.private) || !self.private || !has(self.mode) || self.mode
                == ''http'''
            - message: listenPort only applies to L4 modes (tcp/tls/udp)
              rule: '!has(self.listenPort) || (has(self.mode) && self.mode != ''http'')'
            - message: tcp/tls/udp modes require a non-zero listenPort
              rule: '!has(self.mode) || self.mode == ''http'' || (has(self.listenPort)
                && self.listenPort > 0)'
            - message: proxyProtocol (PROXY protocol v2) only applies to tcp/tls modes
              rule: '!has(self.proxyProtocol) || !self.proxyProtocol || (has(self.mode)
                && (self.mode == ''tcp'' || self.mode == ''tls''))'
          status:
            default:
              observedGeneration: -1
            description: ReverseProxyServiceStatus defines the observed state of ReverseProxyService.
            properties:
              conditions:
                description: Conditions holds the conditions for the ReverseProxyService.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the last reconciled generation.
                format: int64
                type: integer
              serviceDomain:
                description: |-
                  ServiceDomain is the domain actually registered with NetBird. It equals
                  spec.domain for http/tls, and the synthesized per-port sibling subdomain
                  (<first-label>-<portName>.<parent>, e.g. mail-smtp.example.com) for tcp/udp.
                type: string
              serviceID:
                description: ServiceID is the id of the created NetBird reverse-proxy
                  service.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
