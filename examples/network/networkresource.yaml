# A NetworkResource routes a single address — an IP, CIDR, or domain — into the
# network, reachable by NetBird peers that have access to its groups. Unlike a
# LoadBalancer Service (see ../expose, which the operator advertises for you),
# this is hand-authored for an arbitrary address the operator doesn't manage —
# e.g. an on-prem host, a database, or a CIDR block behind the routing peers.
apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: db
  namespace: netbird
spec:
  networkRef: { name: prod, namespace: netbird }
  name: db
  address: 10.0.0.10          # an IP, CIDR (10.0.0.0/24), or domain (db.internal)
  groups:
    - name: All               # who the resource is grouped under (for access policies)
  # description: "prod database"
  # enabled: true
