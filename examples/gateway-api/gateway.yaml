apiVersion: netbird.io/v1alpha1
kind: NetworkRouter
metadata:
  name: netbird
  namespace: netbird
spec:
  dnsZoneRef:
    name: cluster.local
  # Route the cluster Service CIDR(s) into the network as subnet resources so
  # ClusterIPs are reachable through the routing peers (the reverse proxy and L4
  # peers reach Services this way). Use your cluster's actual Service CIDR(s).
  serviceCIDRs:
    - 10.96.0.0/12
  # Groups assigned to the network's resources so access policies can target
  # them. "All" = every peer.
  resourceGroups:
    - name: All
---
# One GatewayClass serves both modes; the route kind decides the behaviour
# (HTTPRoute -> public L7 reverse proxy, TCPRoute -> private L4 resource).
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: netbird
spec:
  controllerName: "gateway.netbird.io/controller"
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: private
  namespace: netbird
spec:
  gatewayClassName: netbird
  listeners:
  - protocol: gateway.netbird.io/NetworkRouter
    name: netbird
    port: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: public
  namespace: netbird
spec:
  gatewayClassName: netbird
  listeners:
  - protocol: gateway.netbird.io/NetworkRouter
    name: netbird
    port: 1
