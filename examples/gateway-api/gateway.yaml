apiVersion: netbird.io/v1alpha1
kind: NetworkRouter
metadata:
  name: netbird
  namespace: netbird
spec:
  dnsZoneRef:
    name: cluster.local
  # Route the cluster Service CIDR(s) into the network as subnet resources so
  # ClusterIPs are reachable through the routing peers (needed for domain
  # routingMode; harmless otherwise). Use your cluster's actual Service CIDR(s).
  serviceCIDRs:
    - 10.96.0.0/12
  # Groups assigned to the network's resources so access policies can target
  # them. "All" = every peer.
  resourceGroups:
    - name: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: netbird-public
spec:
  controllerName: "gateway.netbird.io/controller"
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: netbird-private
spec:
  controllerName: "gateway.netbird.io/controller"
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: private
  namespace: netbird
spec:
  gatewayClassName: netbird-private
  listeners:
  - protocol: gateway.netbird.io/NetworkRouter
    name: netbird
    port: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: public
  namespace: netbird
spec:
  gatewayClassName: netbird-public
  listeners:
  - protocol: gateway.netbird.io/NetworkRouter
    name: netbird
    port: 1
