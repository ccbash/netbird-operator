apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx
  namespace: default
  labels:
    app: nginx
spec:
  hostnames:
  - nginx-test-app.eu1.netbird.services
  parentRefs:
  - name: public
    namespace: netbird
  rules:
    - backendRefs:
        - name: nginx
          port: 80
---
# Configures the reverse-proxy service for the HTTPRoute above. proxyCluster is
# required for HTTP exposure. Other fields are applied to the NetBird proxy
# service and won't be reset on reconcile.
apiVersion: netbird.io/v1alpha1
kind: NBServicePolicy
metadata:
  name: nginx
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: nginx
  proxyCluster: gate.example.com   # your NetBird reverse-proxy cluster address
  upstream: hostname               # hostname (proxy resolves the FQDN; dualstack) | ip
  crowdsecMode: observe            # off | observe | enforce
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: default
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - image: nginx
        imagePullPolicy: Always
        name: nginx
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: default
  labels:
    app: nginx
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app: nginx
